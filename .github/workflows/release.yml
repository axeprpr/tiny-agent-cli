name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          NAME="onek"
          BASE="${NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          PKG_DIR="dist/${BASE}"

          mkdir -p "${PKG_DIR}"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${PKG_DIR}/${NAME}${{ matrix.ext }}" \
            ./cmd/onek

          cp README.md "${PKG_DIR}/README.md"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (
              cd dist
              zip -qr "${BASE}.zip" "${BASE}"
            )
          else
            tar -C dist -czf "dist/${BASE}.tar.gz" "${BASE}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: package-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
