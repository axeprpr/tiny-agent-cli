name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            asset: tacli-linux-amd64
          - goos: linux
            goarch: arm64
            ext: ""
            asset: tacli-linux-arm64
          - goos: darwin
            goarch: amd64
            ext: ""
            asset: tacli-darwin-amd64
          - goos: darwin
            goarch: arm64
            ext: ""
            asset: tacli-darwin-arm64
          - goos: windows
            goarch: amd64
            ext: .exe
            asset: tacli-windows-amd64.exe
          - goos: windows
            goarch: arm64
            ext: .exe
            asset: tacli-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          NAME="tacli"
          mkdir -p dist

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/${{ matrix.asset }}" \
            ./cmd/tacli

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
          overwrite_files: true
